completion_models:
  default_completion_model:
    model_provider: openai
    model: ${OPENAI_MODEL}
    api_base: ${OPENAI_BASE_URL}
    api_key: ${OPENAI_API_KEY}
    auth_method: api_key
    retry:
      type: exponential_backoff
      max_retries: 7
      base_delay: 2.0

embedding_models:
  default_embedding_model:
    model_provider: openai
    model: ${EMBEDDING_MODEL}
    api_base: ${EMBEDDING_BASE_URL}
    api_key: ${OPENAI_API_KEY}
    auth_method: api_key

input:
  type: text
  storage:
    type: file
    base_dir: input
  file_pattern: ".*\\.txt$$"

output:
  type: file
  base_dir: output

cache:
  type: json
  storage:
    type: file
    base_dir: cache

vector_store:
  default_vector_store:
    type: lancedb
    db_uri: output/lancedb
    container_name: default

chunks:
  size: 1200
  overlap: 100

extract_graph:
  completion_model_id: default_completion_model
  max_gleanings: 1
  entity_types:
    - person
    - organization
    - location
    - event

cluster_graph:
  max_cluster_size: 10
  use_lcc: true

community_reports:
  completion_model_id: default_completion_model
  max_length: 2000
  max_input_length: 8000

embed_text:
  embedding_model_id: default_embedding_model
  vector_store_id: default_vector_store

local_search:
  completion_model_id: default_completion_model
  embedding_model_id: default_embedding_model
  text_unit_prop: 0.5
  community_prop: 0.1
  top_k_entities: 10
  top_k_relationships: 10
  max_context_tokens: 12000

global_search:
  completion_model_id: default_completion_model
  data_max_tokens: 12000
  map_max_length: 1000
  reduce_max_length: 2000
